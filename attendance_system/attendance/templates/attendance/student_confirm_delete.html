<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Record</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card border-danger shadow">
                    <div class="card-header bg-danger text-white text-center">
                        <h4 class="mb-0">Confirm Deletion</h4>
                    </div>
                    <div class="card-body text-center p-4">
                        <p class="lead">Are you sure you want to delete the record for:</p>
                        <h3 class="text-danger mb-4">"{{ student.name }}"</h3>
                        <p class="text-muted small">This action cannot be undone.</p>

                        <form method="POST">
                            {% csrf_token %}
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger btn-lg">Yes, Delete Record</button>
                                <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">No, Keep It</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
