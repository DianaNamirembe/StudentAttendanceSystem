<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0">
                    <div class="card-header bg-info text-white text-center py-3">
                        <h3 class="mb-0">Student Profile</h3>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-4 text-center">
                            <div class="bg-secondary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                                style="width: 80px; height: 80px; font-size: 2rem;">
                                {{ student.name|first|upper }}
                            </div>
                        </div>

                        <ul class="list-group list-group-flush">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <strong>Full Name:</strong>
                                <span>{{ student.name }}</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <strong>Student ID:</strong>
                                <span class="text-muted">{{ student.student_id }}</span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <strong>Attendance Status:</strong>
                                {% if student.is_present %}
                                <span class="badge rounded-pill bg-success">Present</span>
                                {% else %}
                                <span class="badge rounded-pill bg-danger">Absent</span>
                                {% endif %}
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                <strong>Recorded On:</strong>
                                <span>{{ student.date }}</span>
                            </li>
                        </ul>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-around py-3">
                        <a href="{% url 'student_list' %}" class="btn btn-secondary">Back to List</a>
                        <a href="{% url 'student_update' student.pk %}" class="btn btn-warning">Edit Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
