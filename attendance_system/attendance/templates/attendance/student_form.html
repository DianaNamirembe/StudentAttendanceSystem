<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Record Student Attendance</h4>
                    </div>
                    <div class="card-body">
                        <form method="POST">
                            {% csrf_token %}

                            <div class="mb-3">
                                <label class="form-label">Student Name</label>
                                <input type="text" name="student_name" class="form-control" value="{{ student.name }}"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Student ID</label>
                                <input type="text" name="sid" class="form-control" value="{{ student.student_id }}"
                                    required>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" name="present" class="form-check-input" id="presentCheck"
                                 {% if student.is_present %} checked {% endif %}>
                                <label class="form-check-label" for="presentCheck">Is Present?</label>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Date</label>
                                <input type="date" name="attendance_date" class="form-control"
                                    value="{{ student.date|date:'Y-m-d' }}" required>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-success">Save Record</button>
                                <a href="{% url 'student_list' %}" class="btn btn-outline-secondary">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
